name: Publicar sitio Quarto

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.38"

      - name: Render sitio
        working-directory: material
        run: quarto render

      - name: Render perfil canvas (páginas sin sidebar para los módulos de Canvas)
        working-directory: material
        run: |
          quarto render --profile canvas
          cp -r _render/canvas _render/site/canvas

      - name: Filtrar material solo-profesor del deploy (patrón SyS)
        run: |
          # las slides se renderizan junto a su clase (para el render
          # local del profesor), pero NO se publican en el sitio
          find material/_render/site -name 'slides_s*.html' -delete
          echo "slides restantes en material/_render/site: $(find material/_render/site -name 'slides_s*.html' | wc -l)"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: material/_render/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
