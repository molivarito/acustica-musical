<style>
/* Estilo compartido para los .md del curso convertidos a HTML
   (misma familia editorial de las demos y del mapa del curso) */
:root { --tinta:#1a1a1a; --acento:#7a2e2e; --azul:#2e4a7a;
        --papel:#faf8f4; --panel:#f0ece4; }
body { margin:0 auto; padding:2rem 1.4rem 4rem; max-width:820px;
       background:var(--papel); color:var(--tinta);
       font-family:Georgia,'Times New Roman',serif; line-height:1.55;
       font-size:1.02rem; }
h1,h2,h3,h4 { font-family:Georgia,serif; line-height:1.25; }
h1 { font-size:1.6rem; border-bottom:2px solid var(--tinta);
     padding-bottom:.3rem; }
h2 { font-size:1.25rem; margin-top:2rem; color:var(--acento); }
h3 { font-size:1.05rem; margin-top:1.5rem; }
a { color:var(--azul); }
blockquote { border-left:4px solid var(--acento); margin:1rem 0;
             padding:.2rem 1rem; background:var(--panel);
             border-radius:0 6px 6px 0; }
table { border-collapse:collapse; margin:1rem 0; font-size:.92rem;
        display:block; overflow-x:auto; }
th { font-family:Helvetica,Arial,sans-serif; font-size:.78rem;
     text-transform:uppercase; letter-spacing:.04em; text-align:left;
     border-bottom:2px solid var(--tinta); padding:.45rem .6rem;
     background:var(--papel); }
td { padding:.45rem .6rem; border-bottom:1px solid #ddd;
     vertical-align:top; }
code { font-family:Menlo,Consolas,monospace; font-size:.86em;
       background:var(--panel); padding:.08em .35em; border-radius:3px; }
pre { background:var(--panel); padding:.8rem 1rem; border-radius:6px;
      overflow-x:auto; }
pre code { background:none; padding:0; }
hr { border:none; border-top:1px solid #ccc; margin:2rem 0; }
img { max-width:100%; }
figure { margin:1.6rem auto; text-align:center; }
figure img { max-width:min(100%, 680px); }
figcaption { font-family:Helvetica,Arial,sans-serif; font-size:.82rem;
             color:#555; margin-top:.5rem; text-align:left;
             max-width:640px; margin-inline:auto; line-height:1.4; }
li { margin-bottom:.25rem; }
math { font-size:1.05em; }
@media print { body { background:white; max-width:none; } }
</style>
