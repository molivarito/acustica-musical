# canvas.yml — fuente de verdad de la estructura de módulos de Canvas.
#
# Este archivo lo lee canvas/publicar_canvas.py (comando `sync`). Los
# módulos se identifican por `nombre` exacto y los ítems por `titulo`
# exacto dentro de su módulo — cambiar cualquiera de los dos hace que
# el script cree uno nuevo en vez de actualizar el existente.
#
# `{sitio}` se reemplaza por el valor de `sitio` en cada url.
#
# curso_id 112005 = MUC860-1 Acústica Musical, 2do semestre 2026.
# Generado a partir de la sidebar de `_quarto.yml` (mismo orden y
# secciones que el sitio publicado). Se excluyen del sync los
# documentos que no forman parte del sitio público — pautas de
# evaluación, guión del profesor (ver `_quarto.yml`, exclusiones en
# `render:`) — y la "Bitácora de diseño" (documentos de proceso interno
# del diseño del curso, no contenido para alumnos).

curso_id: 112005
base_url: https://cursos.canvas.uc.cl
sitio: https://molivarito.github.io/acustica-musical

