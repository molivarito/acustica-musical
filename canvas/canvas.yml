# canvas.yml — fuente de verdad de la estructura de módulos de Canvas.
#
# Este archivo lo lee canvas/publicar_canvas.py (comando `sync`). Los
# módulos se identifican por `nombre` exacto y los ítems por `titulo`
# exacto dentro de su módulo — cambiar cualquiera de los dos hace que
# el script cree uno nuevo en vez de actualizar el existente.
#
# `{sitio}` se reemplaza por el valor de `sitio` en cada url.
#
# curso_id 112005 = MUC860-1 Acústica Musical, 2do semestre 2026.
# Espejo de la sidebar de `_quarto.yml` (mismo orden y secciones que el
# sitio publicado). REGLA DE VISIBILIDAD (2026-07-22): Canvas y el sitio
# contienen SOLO material para estudiantes — apuntes, guías/hojas de
# actividades, demos, libro, programa y apps. El material solo-profesor
# (planes de sesión, pautas, pruebas, guión, banco de estímulos,
# planilla de rúbrica, documentos de diseño y bitácora) NO se agrega
# aquí ni al `render:` de `_quarto.yml`.

curso_id: 112005
base_url: https://cursos.canvas.uc.cl
sitio: https://molivarito.github.io/acustica-musical/canvas

