# Sitio del curso Acústica Musical (UC) — proyecto Quarto
# Renderizar:  conda run -n base quarto render        (desde material/)
# Previsualizar mientras se edita:  conda run -n base quarto preview
#
# Para agregar una sesión/capítulo nuevo: crear el .md y agregar su ruta
# en la sección sidebar correspondiente (y en `render:` si cae fuera de
# los directorios ya listados).

project:
  type: website
  output-dir: _render/site
  # El sitio es el artefacto PARA ESTUDIANTES. Material solo-profesor
  # (planes de sesión, pautas, pruebas, banco de estímulos, planilla,
  # documentos de diseño y bitácora) queda fuera del render y NUNCA se
  # enlaza con links Markdown desde páginas públicas (Quarto copiaría
  # el .md crudo a _render/site): mencionarlo solo en backticks.
  render:
    - index.qmd
    - programa_curso.md
    - curso/**/*.md
    - curso/**/slides_*.qmd
    - "!curso/**/plan.md"
    - "!curso/**/*pauta*.md"
    - "!curso/**/guion_profesor*.md"
    - libro/*.md
    - apps_recomendadas.md
  resources:
    - "demos/*.html"
    - "assets/figuras/*.svg"
    - "assets/figuras/libros/*.png"
    - "libro/LIBRO_CURSO.pdf"

lang: es

